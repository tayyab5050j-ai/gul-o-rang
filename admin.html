<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gul-o-rang — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F0EB;
      --card: #FFFFFF;
      --accent: #D4897A;
      --accent-dark: #BD7A6C;
      --accent-light: #EED0C8;
      --green: #4A8B7A;
      --red: #D48080;
      --text: #2C2420;
      --text-muted: #8B7D6B;
      --border: #E8DDD2;
      --shadow: rgba(180, 140, 110, 0.1);
      --radius: 10px;
      --transition: 0.25s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    input, select, textarea, button { font-family: inherit; }

    /* ─── LOGIN ─── */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-box {
      background: var(--card);
      padding: 40px 36px;
      border-radius: var(--radius);
      box-shadow: 0 4px 24px var(--shadow);
      width: 100%;
      max-width: 380px;
    }
    .login-box h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .login-box p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    .login-box input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color var(--transition);
      margin-bottom: 14px;
    }
    .login-box input:focus {
      border-color: var(--accent);
    }
    .login-box .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
    }
    .login-box .btn:hover { background: var(--accent-dark); }
    .login-error {
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 10px;
      display: none;
    }

    /* ─── ADMIN LAYOUT ─── */
    #adminApp {
      display: none;
      min-height: 100vh;
    }

    .admin-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .admin-header h2 {
      font-size: 1.15rem;
      font-weight: 600;
    }
    .admin-header span { color: var(--accent); }
    .admin-header .logout-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .admin-header .logout-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .admin-body {
      display: flex;
      min-height: calc(100vh - 56px);
    }

    .admin-sidebar {
      width: 200px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      flex-shrink: 0;
    }
    .admin-sidebar button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .admin-sidebar button:hover {
      background: var(--bg);
      color: var(--text);
    }
    .admin-sidebar button.active {
      background: var(--bg);
      color: var(--accent);
      font-weight: 600;
    }

    .admin-content {
      flex: 1;
      padding: 28px;
      overflow-x: auto;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* ─── DASHBOARD ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .stat-card .stat-num {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ─── TABLE ─── */
    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .table-toolbar h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .table-toolbar .btn {
      padding: 8px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
    }
    .table-toolbar .btn:hover { background: var(--accent-dark); }
    .table-toolbar .btn-sm {
      padding: 5px 12px;
      font-size: 0.78rem;
      border-radius: 4px;
    }
    .table-toolbar .btn-danger { background: var(--red); }
    .table-toolbar .btn-danger:hover { background: #c46a6a; }
    .table-toolbar .btn-green { background: var(--green); }
    .table-toolbar .btn-green:hover { background: #6a9a68; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th {
      text-align: left;
      padding: 12px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 11px 14px;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(196, 154, 108, 0.03); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 500;
    }
    .badge-pending { background: #FEF3E2; color: #B8860B; }
    .badge-processing { background: #E8F0FE; color: #2563EB; }
    .badge-shipped { background: #E0F0E8; color: #1A7A4A; }
    .badge-delivered { background: #E8F5E8; color: #2E7D32; }
    .badge-cancelled { background: #FEE8E8; color: #C62828; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .modal .form-group {
      margin-bottom: 14px;
    }
    .modal .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .modal .form-group input,
    .modal .form-group textarea,
    .modal .form-group select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .modal .form-group input:focus,
    .modal .form-group textarea:focus,
    .modal .form-group select:focus {
      border-color: var(--accent);
    }
    .modal .form-group textarea { min-height: 70px; resize: vertical; }
    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .modal-buttons .btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .modal-buttons .btn-primary { background: var(--accent); color: #fff; }
    .modal-buttons .btn-primary:hover { background: var(--accent-dark); }
    .modal-buttons .btn-secondary { background: var(--bg); color: var(--text); }
    .modal-buttons .btn-secondary:hover { background: var(--border); }
    .modal-buttons .btn-danger { background: var(--red); color: #fff; }
    .modal-buttons .btn-danger:hover { background: #c46a6a; }

    /* ─── ORDER DETAIL ─── */
    .order-detail-items {
      margin: 12px 0;
      padding: 12px;
      background: var(--bg);
      border-radius: 6px;
    }
    .order-detail-items .od-line {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 4px 0;
      color: var(--text-muted);
    }

    @media (max-width: 700px) {
      .admin-sidebar { display: none; }
      .admin-content { padding: 16px; }
      .admin-header { padding: 12px 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      table { font-size: 0.8rem; }
      th, td { padding: 8px 10px; }
    }
  </style>
</head>
<body>

  <!-- ─── LOGIN ─── -->
  <div id="loginPage">
    <div class="login-box">
      <h1>gul-o-rang</h1>
      <p>Admin Panel</p>
      <input type="password" id="loginPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn" onclick="doLogin()">Sign In</button>
      <div class="login-error" id="loginError">Incorrect password</div>
    </div>
  </div>

  <!-- ─── ADMIN ─── -->
  <div id="adminApp">
    <div class="admin-header">
      <h2>gul-o-<span>rang</span> / Admin</h2>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
    <div class="admin-body">
      <div class="admin-sidebar">
        <button class="active" data-page="dashboard">Dashboard</button>
        <button data-page="products">Products</button>
        <button data-page="orders">Orders</button>
      </div>
      <div class="admin-content">
        <!-- Dashboard -->
        <div class="page active" id="page-dashboard">
          <div class="stats-grid" id="statsGrid"></div>
          <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
            <h3 style="font-size:1rem;font-weight:600;margin-bottom:12px">Recent Orders</h3>
            <div id="recentOrders"></div>
          </div>
        </div>

        <!-- Products -->
        <div class="page" id="page-products">
          <div class="table-toolbar">
            <h3>Products</h3>
            <button class="btn" onclick="openProductModal()">+ Add Product</button>
          </div>
          <table>
            <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead>
            <tbody id="productTableBody"></tbody>
          </table>
          <div class="empty-state" id="productEmpty" style="display:none">No products yet. Add your first one!</div>
        </div>

        <!-- Orders -->
        <div class="page" id="page-orders">
          <div class="table-toolbar">
            <h3>Orders</h3>
          </div>
          <table>
            <thead><tr><th>Order #</th><th>Customer</th><th>Items</th><th>Total</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="orderTableBody"></tbody>
          </table>
          <div class="empty-state" id="orderEmpty" style="display:none">No orders yet.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── PRODUCT MODAL ─── -->
  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <h3 id="productModalTitle">Add Product</h3>
      <input type="hidden" id="editProductId">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="prodName" placeholder="e.g. Rosetta Rose">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="prodCategory">
          <option value="rose">Rose</option>
          <option value="sunflower">Sunflower</option>
          <option value="tulip">Tulip</option>
          <option value="wildflower">Wildflower</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price (PKR)</label>
        <input type="number" id="prodPrice" placeholder="e.g. 1200">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="prodDesc" placeholder="Describe the flower..."></textarea>
      </div>
      <div class="form-group">
        <label>Colors (comma-separated hex, e.g. #D4A0A0,#C49090)</label>
        <input type="text" id="prodColors" placeholder="#D4A0A0,#C49090">
      </div>
      <div class="form-group">
        <label>Product Images (up to 5)</label>
        <input type="file" id="prodImage" accept="image/*" multiple style="font-size:0.82rem;padding:6px 0">
        <div id="imagePreviews" style="margin-top:8px;display:none;display:flex;gap:8px;flex-wrap:wrap"></div>
      </div>
      <div class="modal-buttons">
        <button class="btn btn-primary" onclick="saveProduct()">Save</button>
        <button class="btn btn-secondary" onclick="closeProductModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ─── ORDER DETAIL MODAL ─── -->
  <div class="modal-overlay" id="orderModal">
    <div class="modal">
      <h3>Order Details</h3>
      <div id="orderDetailContent"></div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="closeOrderModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    const PASS = 'admin123';
    let products = [];
    let orders = [];

    async function loadData() {
      try {
        const p = await API.getProducts();
        if (p && p.length) products = p;
      } catch {}
      try {
        const o = await API.getOrders();
        if (o && o.length) orders = o;
      } catch {}
    }

    function saveProducts() { API.saveProducts(products); }
    function saveOrders() { API.saveOrders(orders); }

    // ─── LOGIN ───
    function doLogin() {
      const pass = document.getElementById('loginPass').value;
      if (pass === PASS) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('loginPass').value = '';
        initAdmin();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function doLogout() {
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('adminApp').style.display = 'none';
    }

    // ─── SIDEBAR ───
    document.querySelectorAll('.admin-sidebar button').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.admin-sidebar button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + this.dataset.page).classList.add('active');
      });
    });

    // ─── DASHBOARD ───
    function renderDashboard() {
      const totalProducts = products.length;
      const totalOrders = orders.length;
      const totalRevenue = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + o.total, 0);
      const pendingOrders = orders.filter(o => o.status === 'pending').length;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-num">${totalProducts}</div><div class="stat-label">Products</div></div>
        <div class="stat-card"><div class="stat-num">${totalOrders}</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card"><div class="stat-num">PKR ${totalRevenue.toLocaleString()}</div><div class="stat-label">Revenue</div></div>
        <div class="stat-card"><div class="stat-num">${pendingOrders}</div><div class="stat-label">Pending</div></div>
      `;

      const recent = orders.slice(-5).reverse();
      const container = document.getElementById('recentOrders');
      if (recent.length === 0) {
        container.innerHTML = '<div class="empty-state">No orders yet.</div>';
        return;
      }
      container.innerHTML = recent.map(o => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.85rem">
          <span style="font-weight:500">#${o.id.toString().slice(-6)}</span>
          <span style="color:var(--text-muted)">${o.customer ? o.customer.name : 'Guest'}</span>
          <span style="color:var(--accent);font-weight:500">PKR ${o.total.toLocaleString()}</span>
          <span class="badge badge-${o.status}">${o.status}</span>
        </div>
      `).join('');
    }

    // ─── PRODUCTS ───
    function renderProducts() {
      const tbody = document.getElementById('productTableBody');
      const empty = document.getElementById('productEmpty');
      if (products.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      tbody.innerHTML = products.map(p => `
        <tr>
          <td style="display:flex;align-items:center;gap:10px">
            <div style="width:36px;height:36px;border-radius:6px;background:var(--accent-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--text-muted)">${p.hasImages ? p.imageCount : 0}</div>
            <strong>${p.name}</strong>
          </td>
          <td style="color:var(--text-muted);text-transform:capitalize">${p.category}</td>
          <td style="color:var(--accent);font-weight:500">PKR ${p.price.toLocaleString()}</td>
          <td>
            <button class="btn btn-sm btn-green" onclick="editProduct(${p.id})" style="margin-right:6px">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    let uploadedImages = [];

    function openProductModal(data) {
      document.getElementById('editProductId').value = data ? data.id : '';
      document.getElementById('prodName').value = data ? data.name : '';
      document.getElementById('prodCategory').value = data ? data.category : 'rose';
      document.getElementById('prodPrice').value = data ? data.price : '';
      document.getElementById('prodDesc').value = data ? data.desc : '';
      document.getElementById('prodColors').value = data ? (data.colors || []).join(',') : '';
      document.getElementById('productModalTitle').textContent = data ? 'Edit Product' : 'Add Product';
      const previews = document.getElementById('imagePreviews');
      const fileInput = document.getElementById('prodImage');
      uploadedImages = [];
      fileInput.value = '';
      if (data && (data.images || data.image)) {
        const imgs = data.images || (data.image ? [data.image] : []);
        previews.style.display = 'flex';
        previews.innerHTML = imgs.map(src => `
          <div style="width:76px;height:76px;border-radius:8px;overflow:hidden;border:1px solid var(--border);position:relative">
            <img src="${src}" style="width:100%;height:100%;object-fit:cover">
          </div>
        `).join('');
        uploadedImages = [...imgs];
      } else {
        previews.style.display = 'none';
        previews.innerHTML = '';
      }
      document.getElementById('productModal').classList.add('open');
    }

    document.getElementById('prodImage').addEventListener('change', function() {
      const files = Array.from(this.files).slice(0, 5);
      if (!files.length) return;
      const previews = document.getElementById('imagePreviews');
      previews.style.display = 'flex';
      previews.innerHTML = '';
      uploadedImages = [];
      files.forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          uploadedImages[idx] = e.target.result;
          const div = document.createElement('div');
          div.style.cssText = 'width:76px;height:76px;border-radius:8px;overflow:hidden;border:1px solid var(--border)';
          div.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
          previews.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
    });

    function closeProductModal() {
      document.getElementById('productModal').classList.remove('open');
    }

    function saveProduct() {
      const id = document.getElementById('editProductId').value;
      const name = document.getElementById('prodName').value.trim();
      const category = document.getElementById('prodCategory').value;
      const price = parseInt(document.getElementById('prodPrice').value);
      const desc = document.getElementById('prodDesc').value.trim();
      const colors = document.getElementById('prodColors').value.split(',').map(c => c.trim()).filter(Boolean);

      if (!name || !price) return;

      const images = uploadedImages.filter(Boolean);
      const productData = { name, category, price, desc, colors: colors.length ? colors : ['#D4897A','#C47A6A','#E0A090'] };
      if (images.length) productData.images = images;

      if (id) {
        const idx = products.findIndex(p => p.id === parseInt(id));
        if (idx !== -1) {
          products[idx] = { ...products[idx], ...productData };
        }
      } else {
        productData.id = Date.now();
        products.push(productData);
      }
      saveProducts();
      renderProducts();
      renderDashboard();
      closeProductModal();
    }

    async function editProduct(id) {
      let p = products.find(p => p.id === id);
      if (!p) return;
      if (p.hasImages) {
        try { p = await API.getProduct(id); } catch {}
      }
      openProductModal(p);
    }

    function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      products = products.filter(p => p.id !== id);
      saveProducts();
      renderProducts();
      renderDashboard();
    }

    // ─── ORDERS ───
    function renderOrders() {
      const tbody = document.getElementById('orderTableBody');
      const empty = document.getElementById('orderEmpty');
      if (orders.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      const sorted = [...orders].reverse();
      tbody.innerHTML = sorted.map(o => `
        <tr>
          <td style="font-weight:500">#${o.id.toString().slice(-6)}</td>
          <td>${o.customer ? o.customer.name : 'N/A'}</td>
          <td>${o.items ? o.items.length : 0} item(s)</td>
          <td style="color:var(--accent);font-weight:500">PKR ${o.total.toLocaleString()}</td>
          <td style="color:var(--text-muted);font-size:0.8rem">${new Date(o.date).toLocaleDateString()}</td>
          <td>
            <select class="status-select" data-id="${o.id}" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:0.78rem;outline:none">
              <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>Processing</option>
              <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Shipped</option>
              <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Delivered</option>
              <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
            </select>
          </td>
          <td>
            <button class="btn btn-sm" onclick="viewOrder(${o.id})" style="margin-right:6px">View</button>
          </td>
        </tr>
      `).join('');

      document.querySelectorAll('.status-select').forEach(sel => {
        sel.addEventListener('change', function() {
          const id = parseInt(this.dataset.id);
          const order = orders.find(o => o.id === id);
          if (order) {
            order.status = this.value;
            saveOrders();
            renderDashboard();
            renderOrders();
          }
        });
      });
    }

    function viewOrder(id) {
      const o = orders.find(order => order.id === id);
      if (!o) return;
      const itemsHtml = (o.items || []).map(i =>
        `<div class="od-line"><span>${i.name} x${i.qty}</span><span>PKR ${(i.price * i.qty).toLocaleString()}</span></div>`
      ).join('');
      const cust = o.customer || {};
      document.getElementById('orderDetailContent').innerHTML = `
        <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:8px">Order #${o.id.toString().slice(-6)} — <span class="badge badge-${o.status}">${o.status}</span></div>
        <div style="font-size:0.85rem;margin-bottom:12px">
          <strong>Customer:</strong> ${cust.name || 'N/A'}<br>
          <strong>Email:</strong> ${cust.email || 'N/A'}<br>
          <strong>Phone:</strong> ${cust.phone || 'N/A'}<br>
          <strong>Address:</strong> ${cust.address || 'N/A'}
        </div>
        <div class="order-detail-items">${itemsHtml}</div>
        <div class="order-detail-items" style="font-weight:600;display:flex;justify-content:space-between">
          <span>Total</span>
          <span style="color:var(--accent)">PKR ${o.total.toLocaleString()}</span>
        </div>
        <div style="font-size:0.78rem;color:var(--text-muted);margin-top:8px">Placed: ${new Date(o.date).toLocaleString()}</div>
      `;
      document.getElementById('orderModal').classList.add('open');
    }

    function closeOrderModal() {
      document.getElementById('orderModal').classList.remove('open');
    }

    // ─── INIT ───
    async function initAdmin() {
      await loadData();
      renderDashboard();
      renderProducts();
      renderOrders();
    }

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('open');
      });
    });
  </script>
</body>
</html>
